# ponytail: ZTK-BF deployment note
# The supabase CLI does not support a per-service `host` field for port publishing
# (it always publishes on 0.0.0.0). On ZTK-BF, the loopback-only constraint is enforced
# out-of-band via iptables (nftables INPUT chain dropping non-loopback to 54321-54328)
# — see the onlook deploy runbook. Tests/clones outside ZTK-BF do not need the rule.

project_id = "onlook-web"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 100

[auth]
site_url = "https://onlook.com"
additional_redirect_urls = [
    "http://localhost:3002",
    "http://127.0.0.1:3002",
    "http://localhost:3002/auth/callback",
    "http://127.0.0.1:3002/auth/callback",
]
jwt_expiry = 36000

[db]
port = 54322

[studio]
port = 54323

[auth.external.github]
enabled = true
client_id = "env(GITHUB_CLIENT_ID)"
secret = "env(GITHUB_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[analytics]
enabled = true
port = 54327
vector_port = 54328
backend = "postgres"

# ponytail: edge runtime disabled for local dev — editor/chat/CSB don't need Supabase
# edge functions, and its Deno cache write is blocked by SELinux enforcing on ZTK-BF.
# Re-enable if a function is actually needed locally.
[edge_runtime]
enabled = false

[functions.stripe-webhook]
verify_jwt = false

[storage.buckets.preview_images]
public = true
file_size_limit = "10MiB"
